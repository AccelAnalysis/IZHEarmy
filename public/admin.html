<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IZHE Operations</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <header class="border-b border-white/10"><div class="max-w-7xl mx-auto px-6 py-5 flex justify-between"><span class="font-extrabold tracking-[.2em]">IZHE OPERATIONS</span><a href="/" class="text-amber-400 font-bold">SITE</a></div></header>
  <main class="max-w-7xl mx-auto px-6 py-10">
    <section id="login" class="max-w-lg mx-auto bg-slate-900 border border-white/10 rounded-3xl p-7"><h1 class="text-3xl font-bold mb-3">Administrator access</h1><p class="text-slate-400 mb-6">Enter the token configured as <code>IZHE_ADMIN_TOKEN</code>.</p><form id="tokenForm" class="space-y-4"><input id="token" type="password" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3" placeholder="Administrator token"><button class="w-full bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl">OPEN OPERATIONS</button><p id="loginStatus" class="text-sm text-red-400"></p></form></section>
    <section id="dashboard" class="hidden">
      <div class="flex flex-col md:flex-row justify-between gap-4 mb-8"><div><h1 class="text-4xl font-bold">Operations dashboard</h1><p id="updated" class="text-slate-400 mt-2"></p></div><div class="flex gap-3"><button id="refresh" class="border border-white/15 px-5 py-3 rounded-xl font-bold">REFRESH</button><button id="export" class="bg-amber-400 text-slate-950 px-5 py-3 rounded-xl font-bold">EXPORT REDEMPTIONS</button></div></div>
      <form id="createCodes" class="bg-slate-900 border border-white/10 rounded-2xl p-5 grid md:grid-cols-4 gap-4 mb-8"><select id="productId" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3" aria-label="Give One shirt"></select><input id="orderRef" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3" placeholder="Manual order reference"><input id="count" type="number" min="1" max="50" value="1" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3"><button class="bg-white text-slate-950 rounded-xl font-bold">CREATE GIVE CODES</button></form>
      <div class="grid md:grid-cols-3 gap-5 mb-8"><div class="bg-slate-900 rounded-2xl p-6"><p class="text-slate-400">Orders</p><strong id="orderCount" class="text-4xl">0</strong></div><div class="bg-slate-900 rounded-2xl p-6"><p class="text-slate-400">Active codes</p><strong id="activeCount" class="text-4xl">0</strong></div><div class="bg-slate-900 rounded-2xl p-6"><p class="text-slate-400">Pending fulfillment</p><strong id="redemptionCount" class="text-4xl">0</strong></div></div>
      <div class="bg-slate-900 border border-white/10 rounded-2xl overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left border-b border-white/10"><th class="p-4">Confirmation</th><th class="p-4">Recipient</th><th class="p-4">Product / Fit / Size</th><th class="p-4">Address</th><th class="p-4">Status</th><th class="p-4">Created</th><th class="p-4">Action</th></tr></thead><tbody id="redemptions"></tbody></table></div>
    </section>
  </main>
  <script src="/assets/admin.js" defer></script>
</body>
</html>
