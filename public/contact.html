<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact IZHE</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-950 text-white min-h-screen font-sans"><header class="border-b border-white/10"><div class="max-w-4xl mx-auto px-6 py-5 flex justify-between"><a href="/" class="font-extrabold tracking-[.25em] text-xl">IZHE<span class="text-amber-400">.</span></a><a href="/" class="text-amber-400 font-bold text-sm">HOME</a></div></header><main class="max-w-3xl mx-auto px-6 py-16"><p class="text-amber-400 text-xs font-bold tracking-[.2em] mb-4">CONTACT</p><h1 class="text-5xl font-bold mb-5">How can we help?</h1><p class="text-slate-400 mb-10">Use this form for order support, church campaigns, partnerships, or general questions.</p><form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact-thanks.html" class="space-y-5 bg-slate-900 border border-white/10 rounded-3xl p-7"><input type="hidden" name="form-name" value="contact"><p class="hidden"><label>Do not fill: <input name="bot-field"></label></p><label class="block"><span class="block text-sm font-bold mb-2">Name</span><input name="name" required autocomplete="name" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3"></label><label class="block"><span class="block text-sm font-bold mb-2">Email</span><input name="email" type="email" required autocomplete="email" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3"></label><label class="block"><span class="block text-sm font-bold mb-2">Topic</span><select name="topic" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3"><option>Order support</option><option>Give One redemption</option><option>Church campaign</option><option>Partnership</option><option>General question</option></select></label><label class="block"><span class="block text-sm font-bold mb-2">Message</span><textarea name="message" required rows="6" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3"></textarea></label><button class="w-full bg-amber-400 text-slate-950 font-extrabold py-4 rounded-xl">SEND MESSAGE</button></form></main></body></html>
