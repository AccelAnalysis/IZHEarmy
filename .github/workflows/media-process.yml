name: IZHE media processing

on:
  pull_request:
    branches: [main]
    paths:
      - 'IZHE Resource Folder/**'
      - 'scripts/process_media.py'
      - '.github/workflows/media-process.yml'
      - 'public/assets/media/izhe/**'
      - 'netlify/functions/_shared/source-media-library.mjs'
      - 'docs/IZHE-MEDIA-REVIEW.md'
      - 'docs/izhe-media-review.csv'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check pillow
      - name: Normalize originals and generate derivatives
        run: python scripts/process_media.py
      - name: Commit generated media changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo 'Media outputs are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'IZHE Resource Folder' public/assets/media/izhe netlify/functions/_shared/source-media-library.mjs docs/IZHE-MEDIA-REVIEW.md docs/izhe-media-review.csv
          git commit -m 'Normalize and optimize IZHE source media'
          git push
